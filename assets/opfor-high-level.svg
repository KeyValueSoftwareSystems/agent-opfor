      <circle cx="16" cy="23" r="3" fill="#34d399"></circle>
      <text x="30" y="22" font-size="12" font-weight="600" fill="#9fe7c8" letter-spacing="0.2">OWASP MCP</text>
      <text x="30" y="37" font-size="11" font-weight="400" fill="#6b7a7d" letter-spacing="0.4">server &amp; transport</text>
    </g>
    <g transform="translate(610,302)">
