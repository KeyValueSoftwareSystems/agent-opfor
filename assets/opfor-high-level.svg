<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" role="img" aria-labelledby="title-hl desc-hl" preserveAspectRatio="xMidYMid meet" font-family="&#39;JetBrains Mono&#39;,&#39;SF Mono&#39;,Menlo,Consolas,monospace">
  <title id="title-hl">How opfor works</title>
  <desc id="desc-hl">Four entry points — CLI, Browser, MCP and IDE — flow into opfor, which contains four evaluator suites: OWASP LLM, OWASP Agentic, OWASP MCP and EU AI Act bias. Opfor attacks the agent under test, then emits a report in HTML and JSON.</desc>

