    <text x="404" y="228" font-size="11" font-weight="600" letter-spacing="1.8" fill="#8a999c">EVALUATOR SUITES</text>

    <g transform="translate(404,244)">
      <rect width="186" height="46" rx="8" fill="#0c1c18" stroke="#1b4d3e" stroke-width="1"></rect>
      <circle cx="16" cy="23" r="3" fill="#34d399"></circle>
      <text x="30" y="22" font-size="12" font-weight="600" fill="#9fe7c8" letter-spacing="0.2">OWASP LLM</text>
      <text x="30" y="37" font-size="11" font-weight="400" fill="#6b7a7d" letter-spacing="0.4">prompt injection · leakage</text>
    </g>
    <g transform="translate(610,244)">
      <rect width="186" height="46" rx="8" fill="#0c1c18" stroke="#1b4d3e" stroke-width="1"></rect>
      <circle cx="16" cy="23" r="3" fill="#34d399"></circle>
      <text x="30" y="22" font-size="12" font-weight="600" fill="#9fe7c8" letter-spacing="0.2">OWASP Agentic</text>
      <text x="30" y="37" font-size="11" font-weight="400" fill="#6b7a7d" letter-spacing="0.4">tool abuse · planning</text>
    </g>
